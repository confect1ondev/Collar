# Collar - HTTP only (certbot will add TLS)
#
# Configure these for your deployment:
#   FRONTEND_DOMAIN - where the web UI is served (e.g., collar.example.com)
#   API_DOMAIN      - where the API/WebSocket runs (e.g., leash.example.com)
#
# After editing, run: sudo certbot --nginx -d FRONTEND_DOMAIN -d API_DOMAIN

# Frontend
server {
    listen 80;
    server_name FRONTEND_DOMAIN;

    location / {
        proxy_pass http://127.0.0.1:4222;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# API + WebSocket
server {
    listen 80;
    server_name API_DOMAIN;

    # CORS - allow requests from your frontend domain
    # Replace FRONTEND_DOMAIN with your actual domain (include https:// after certbot)
    add_header Access-Control-Allow-Origin "https://FRONTEND_DOMAIN" always;
    add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;
    add_header Access-Control-Allow-Credentials "true" always;

    # Preflight
    if ($request_method = OPTIONS) {
        return 204;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:4221/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /ws {
        proxy_pass http://127.0.0.1:4221/ws;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }
}
